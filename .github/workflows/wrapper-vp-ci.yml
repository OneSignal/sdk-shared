# CI workflow for Vite+-based wrapper SDKs
# Sets up JDK, Clang, Vite+ (vp), then runs lint and tests
name: Wrapper VP CI

on:
  workflow_call:
    inputs:
      java_version:
        required: false
        type: string
        description: Java version to use
        default: "17"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java_version }}
          distribution: "temurin"

      - name: Setup Clang
        uses: OneSignal/actions/.github/actions/setup-clang@main

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1

      - name: Install
        run: vp install --frozen-lockfile

      - name: Linting
        run: vp run lint

      - name: Tests
        run: vp run test:coverage

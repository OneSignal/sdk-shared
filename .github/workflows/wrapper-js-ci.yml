# CI workflow for JavaScript-based wrapper SDKs (Cordova-Ionic/React Native)
# Sets up JDK, Clang, and either Bun or Vite+ (vp), then runs lint and tests
name: Wrapper JS CI

on:
  workflow_call:
    inputs:
      java_version:
        required: false
        type: string
        description: Java version to use
        default: "17"
      runtime:
        required: false
        type: string
        description: Runtime to use for install, lint & test ("bun" or "vp")
        default: bun
      bun_version:
        required: false
        type: string
        description: Bun version to use (only when runtime is "bun")
        default: latest

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java_version }}
          distribution: "temurin"

      - name: Setup Clang
        uses: OneSignal/actions/.github/actions/setup-clang@main

      - name: Set up Bun
        if: inputs.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun_version }}

      - name: Install (Bun)
        if: inputs.runtime == 'bun'
        run: bun install --frozen-lockfile

      - name: Set up Vite+
        if: inputs.runtime == 'vp'
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: yes
          run-install: true

      - name: Linting
        run: ${{ inputs.runtime == 'vp' && 'vp' || 'bun' }} run lint

      - name: Tests
        run: ${{ inputs.runtime == 'vp' && 'vp' || 'bun' }} run test${{ inputs.runtime == 'bun' && ':coverage' || '' }}

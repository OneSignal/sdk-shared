# CI workflow for JavaScript-based wrapper SDKs (Cordova-Ionic/React Native)
# Sets up JDK, Clang, and either Bun or Vite+ (vp), then runs lint and tests
name: Wrapper JS CI

on:
  workflow_call:
    inputs:
      java_version:
        required: false
        type: string
        description: Java version to use
        default: "17"
      toolchain:
        required: false
        type: string
        description: Toolchain to use for install, lint & test ("bun" or "vite-plus")
        default: bun
      bun_version:
        required: false
        type: string
        description: Bun version to use (only when toolchain is "bun")
        default: latest

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java_version }}
          distribution: "temurin"

      - name: Setup Clang
        uses: OneSignal/actions/.github/actions/setup-clang@main

      - name: Set up Bun
        if: inputs.toolchain == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun_version }}

      - name: Install (Bun)
        if: inputs.toolchain == 'bun'
        run: bun install --frozen-lockfile

      - name: Set up Vite+
        if: inputs.toolchain == 'vite-plus'
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: yes
          run-install: true

      - name: Linting (Bun)
        if: inputs.toolchain == 'bun'
        run: bun run lint

      - name: Linting (Vite+)
        if: inputs.toolchain == 'vite-plus'
        run: vp run lint

      - name: Tests (Bun)
        if: inputs.toolchain == 'bun'
        run: bun run test:coverage

      - name: Tests (Vite+)
        if: inputs.toolchain == 'vite-plus'
        run: vp run test

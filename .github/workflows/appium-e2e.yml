name: Appium E2E Tests

on:
  workflow_call:
    inputs:
      platform:
        description: 'Target platform: android or ios'
        required: true
        type: string
      app-artifact:
        description: 'Name of the uploaded artifact containing the app binary'
        required: true
        type: string
      app-filename:
        description: 'Filename of the app binary inside the artifact'
        required: true
        type: string
      sdk-type:
        description: 'SDK type: react-native, flutter, capacitor, unity, cordova, dotnet, ios, or android'
        required: true
        type: string
      runner:
        description: 'Where to run: browserstack or local'
        required: false
        default: 'browserstack'
        type: string
      device:
        description: 'BrowserStack device name'
        required: false
        type: string
      os-version:
        description: 'Device OS version'
        required: false
        type: string
      build-name:
        description: 'Label for the BrowserStack session'
        required: false
        type: string

jobs:
  e2e:
    runs-on: >-
      ${{ (inputs.runner == 'local' && inputs.platform == 'ios') && 'macos-26'
          || 'ubuntu-latest' }}
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.app-artifact }}

      - name: Checkout sdk-shared (for test files)
        uses: actions/checkout@v4
        with:
          repository: OneSignal/sdk-shared
          path: _sdk-shared

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Upload app to BrowserStack
        if: inputs.runner == 'browserstack'
        id: bs-upload
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          APP_FILENAME: ${{ inputs.app-filename }}
        run: |
          RESPONSE=$(curl -s -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
            -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
            -F "file=@${APP_FILENAME}")
          APP_URL=$(echo "$RESPONSE" | jq -r '.app_url')
          if [ "$APP_URL" = "null" ] || [ -z "$APP_URL" ]; then
            echo "::error::Failed to upload app to BrowserStack: $RESPONSE"
            exit 1
          fi
          echo "app-url=$APP_URL" >> "$GITHUB_OUTPUT"
          echo "Uploaded app to BrowserStack: $APP_URL"

      - name: Install test dependencies
        working-directory: _sdk-shared/appium
        run: bun install --frozen-lockfile

      - name: Run Appium tests (BrowserStack)
        if: inputs.runner == 'browserstack'
        working-directory: _sdk-shared/appium
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_APP_URL: ${{ steps.bs-upload.outputs.app-url }}
          SDK_TYPE: ${{ inputs.sdk-type }}
          PLATFORM: ${{ inputs.platform }}
          DEVICE: ${{ inputs.device }}
          OS_VERSION: ${{ inputs.os-version }}
          BUILD_NAME: ${{ inputs.build-name }}
          ONESIGNAL_APP_ID: ${{ vars.APPIUM_ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.APPIUM_ONESIGNAL_API_KEY }}
        run: bunx wdio run "wdio.${PLATFORM}.conf.ts"

      - name: Enable KVM
        if: inputs.runner == 'local' && inputs.platform == 'android'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Appium tests (local Android)
        if: inputs.runner == 'local' && inputs.platform == 'android'
        uses: reactivecircus/android-emulator-runner@v2
        env:
          SDK_TYPE: ${{ inputs.sdk-type }}
          PLATFORM: android
          APP_PATH: ${{ github.workspace }}/${{ inputs.app-filename }}
          ONESIGNAL_APP_ID: ${{ vars.APPIUM_ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.APPIUM_ONESIGNAL_API_KEY }}
        with:
          api-level: 36
          arch: x86_64
          profile: medium_phone
          force-avd-creation: false
          emulator-options: -no-window -no-boot-anim -gpu swiftshader_indirect
          working-directory: _sdk-shared/appium
          script: |
            bun add -g appium@3
            appium driver install uiautomator2
            appium --port 4723 --log-level error &
            for i in {1..30}; do
              curl -sf http://localhost:4723/status && break
              sleep 1
            done
            bunx wdio run wdio.android.conf.ts

      - name: Boot iPhone 17 simulator
        if: inputs.runner == 'local' && inputs.platform == 'ios'
        run: |
          UDID=$(xcrun simctl list devices available -j | jq -r '
            .devices | to_entries[]
            | select(.key | contains("iOS-26"))
            | .value[] | select(.name == "iPhone 17") | .udid' | head -1)
          if [ -z "$UDID" ]; then
            echo "::error::iPhone 17 (iOS 26) simulator not found on this runner"
            xcrun simctl list devices available
            exit 1
          fi
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      - name: Start Appium (local iOS)
        if: inputs.runner == 'local' && inputs.platform == 'ios'
        run: |
          bun add -g appium@3
          appium driver install xcuitest
          appium --port 4723 --log-level error &
          for i in {1..30}; do
            curl -sf http://localhost:4723/status && break
            sleep 1
          done

      - name: Run Appium tests (local iOS)
        if: inputs.runner == 'local' && inputs.platform == 'ios'
        working-directory: _sdk-shared/appium
        env:
          SDK_TYPE: ${{ inputs.sdk-type }}
          PLATFORM: ios
          APP_PATH: ${{ github.workspace }}/${{ inputs.app-filename }}
          ONESIGNAL_APP_ID: ${{ vars.APPIUM_ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.APPIUM_ONESIGNAL_API_KEY }}
        run: bunx wdio run wdio.ios.conf.ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-results-${{ inputs.platform }}-${{ inputs.sdk-type }}
          path: _sdk-shared/appium/results/
          if-no-files-found: ignore

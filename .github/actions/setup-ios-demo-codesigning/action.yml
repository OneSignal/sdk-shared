name: 'Setup iOS Demo Codesigning'
description: 'Import the Appium signing cert and download provisioning profiles for the OneSignal demo app (main target, NSE, Live Activity widget) via the App Store Connect API. Call once per iOS build job in an SDK E2E workflow.'

inputs:
  p12-base64:
    description: 'Base64-encoded .p12 signing certificate'
    required: true
  p12-password:
    description: 'Password used when exporting the .p12'
    required: true
  asc-key-id:
    description: 'App Store Connect API Key ID'
    required: true
  asc-issuer-id:
    description: 'App Store Connect API Issuer ID'
    required: true
  asc-private-key:
    description: 'App Store Connect API private key (.p8) contents, as raw PKCS8 PEM text'
    required: true
  main-bundle-id:
    description: 'Main app bundle identifier'
    required: false
    default: 'com.onesignal.example'
  nse-bundle-id:
    description: 'Notification Service Extension bundle identifier. Leave empty to skip.'
    required: false
    default: 'com.onesignal.example.NSE'
  widget-bundle-id:
    description: 'Live Activity / Widget Extension bundle identifier. Leave empty to skip.'
    required: false
    default: 'com.onesignal.example.LA'
  profile-type:
    description: 'Provisioning profile type (IOS_APP_DEVELOPMENT, IOS_APP_ADHOC, IOS_APP_STORE)'
    required: false
    default: 'IOS_APP_DEVELOPMENT'

runs:
  using: composite
  steps:
    - name: Import signing certificate
      uses: apple-actions/import-codesign-certs@v6
      with:
        p12-file-base64: ${{ inputs.p12-base64 }}
        p12-password: ${{ inputs.p12-password }}
        keychain-password: ci-keychain

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Download provisioning profiles
      shell: bash
      working-directory: ${{ github.action_path }}/../../..
      env:
        ASC_KEY_ID: ${{ inputs.asc-key-id }}
        ASC_ISSUER_ID: ${{ inputs.asc-issuer-id }}
        ASC_KEY_CONTENT: ${{ inputs.asc-private-key }}
        PROFILE_TYPE: ${{ inputs.profile-type }}
        MAIN_BUNDLE_ID: ${{ inputs.main-bundle-id }}
        NSE_BUNDLE_ID: ${{ inputs.nse-bundle-id }}
        WIDGET_BUNDLE_ID: ${{ inputs.widget-bundle-id }}
      run: |
        set -euo pipefail
        BUNDLE_IDS=()
        [ -n "$MAIN_BUNDLE_ID" ] && BUNDLE_IDS+=("$MAIN_BUNDLE_ID")
        [ -n "$NSE_BUNDLE_ID" ] && BUNDLE_IDS+=("$NSE_BUNDLE_ID")
        [ -n "$WIDGET_BUNDLE_ID" ] && BUNDLE_IDS+=("$WIDGET_BUNDLE_ID")
        bun appium/scripts/download_profiles.ts "${BUNDLE_IDS[@]}"
